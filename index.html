function loadState() {
  const saved = localStorage.getItem(STORE_KEY);
  if (!saved) return clone(window.SEED);
  try {
    return { ...clone(window.SEED), ...JSON.parse(saved) };
  } catch {
    return clone(window.SEED);
  }
}

function saveState() {
  localStorage.setItem(STORE_KEY, JSON.stringify(state));
}

function setRoute(next) {
  route = next;

function tablePanel(title, rows, fields, collection) {
  const columnCount = fields.length + (collection ? 1 : 0);
  const gridStyle = `style="grid-template-columns: repeat(${columnCount}, minmax(120px, 1fr))"`;
  return `
    <div class="table-panel">
      ${title ? `<h2>${title}</h2>` : ""}
      <div class="data-table">
        <div class="table-row table-head" ${gridStyle}>
          ${fields.map((field) => `<span>${field}</span>`).join("")}
          ${collection ? "<span>Actions</span>" : ""}
        </div>
        ${rows.map((row, index) => `
          <div class="table-row" ${gridStyle}>
            ${fields.map((field) => `<span>${String(row[field] ?? "")}</span>`).join("")}
            ${collection ? `<span class="actions"><button data-edit="${collection}:${index}">Edit</button><button data-delete="${collection}:${index}">Delete</button></span>` : ""}
          </div>
        `).join("")}
      </div>
    </div>
  `;
}

function input(name, label, value) {
  return `<label><span>${label}</span><input name="${name}" value="${escapeAttr(value)}" /></label>`;
}

function textarea(name, label, value) {
  return `<label class="wide"><span>${label}</span><textarea name="${name}">${escapeHtml(value)}</textarea></label>`;
}

function escapeAttr(value) {
  return String(value ?? "").replaceAll("&", "&amp;").replaceAll('"', "&quot;").replaceAll("<", "&lt;");
}

function escapeHtml(value) {
  return String(value ?? "").replaceAll("&", "&amp;").replaceAll("<", "&lt;");
}

function bindEvents() {
  document.querySelectorAll("[data-route]").forEach((button) => {
    button.addEventListener("click", () => {
      if (button.dataset.scroll) {
        document.getElementById(button.dataset.scroll)?.scrollIntoView({ behavior: "smooth" });
        return;
      }
      setRoute(button.dataset.route);
    });
  });

  document.querySelectorAll("[data-admin]").forEach((button) => {
    button.addEventListener("click", () => {
      adminTab = button.dataset.admin;
      render();
    });
  });

  document.querySelectorAll("[data-student]").forEach((button) => {
    button.addEventListener("click", () => {
      studentTab = button.dataset.student;
      render();
    });
  });

  const cmsForm = document.querySelector("[data-form='cms']");
  if (cmsForm) {
    cmsForm.addEventListener("submit", (event) => {
      event.preventDefault();
      const data = new FormData(cmsForm);
      state.cms = { ...state.cms, ...Object.fromEntries(data.entries()) };
      saveState();
      render();
    });
  }

  document.querySelectorAll("[data-create]").forEach((form) => {
    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const collection = form.dataset.create;
      const item = Object.fromEntries(new FormData(form).entries());
      item.id = uid();
      state[collection].push(item);
      saveState();
      render();
    });
  });

  document.querySelectorAll("[data-delete]").forEach((button) => {
    button.addEventListener("click", () => {
      const [collection, index] = button.dataset.delete.split(":");
      state[collection].splice(Number(index), 1);
      saveState();
      render();
    });
  });

  document.querySelectorAll("[data-edit]").forEach((button) => {
    button.addEventListener("click", () => {
      const [collection, index] = button.dataset.edit.split(":");
      const row = state[collection][Number(index)];
      const title = prompt("Update title/name", row.title || row.name || row.brand || "");
      if (!title) return;
      if ("title" in row) row.title = title;
      else row.name = title;
      saveState();
      render();
    });
  });

  const mediaButton = document.querySelector("[data-media-add]");
  if (mediaButton) {
    mediaButton.addEventListener("click", () => {
      const title = document.getElementById("mediaTitle").value || "Untitled asset";
      const type = document.getElementById("mediaType").value;
      const folder = document.getElementById("mediaFolder").value || "/cms/uploads";
      state.media.push({ id: uid(), title, type, folder });
      saveState();
      render();
    });
  }
}

function render() {
  const app = document.getElementById("app");
  app.innerHTML = route === "admin" ? adminDashboard() : route === "student" ? studentApp() : landingPage();
  bindEvents();
}

render();

    </script>
  </body>
</html>
